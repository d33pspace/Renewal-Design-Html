<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - Shopping Cart</title>
    <link rel="stylesheet" href="css/shopping-cart.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <button class="back-btn" aria-label="返回">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <h1 class="header-title">购物车</h1>
                <div class="header-actions">
                    <button class="icon-btn" aria-label="更多">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="6" r="1.5" fill="currentColor"/>
                            <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                            <circle cx="12" cy="18" r="1.5" fill="currentColor"/>
                        </svg>
                    </button>
                    <button class="icon-btn" aria-label="搜索">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
                            <path d="M16 16L20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="time-status">
                <span class="time">11:39</span>
                <div class="status-icons">
                    <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor">
                        <rect x="0" y="2" width="4" height="8" rx="1"/>
                        <rect x="5" y="1" width="4" height="9" rx="1"/>
                        <rect x="10" y="0" width="4" height="10" rx="1"/>
                        <rect x="15" y="0" width="3" height="10" rx="1" opacity="0.3"/>
                    </svg>
                    <svg width="20" height="12" viewBox="0 0 20 12" fill="currentColor" style="margin-left: 4px;">
                        <rect x="0" y="0" width="16" height="12" rx="2" opacity="0.3"/>
                        <rect x="1" y="1" width="12" height="10" rx="1"/>
                        <rect x="14" y="3" width="4" height="6" rx="1"/>
                    </svg>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab tab-active">开业活动</button>
            <button class="tab">全场包邮</button>
        </div>

        <!-- Cart Items -->
        <div class="cart-items">
            <!-- Item 1 -->
            <div class="cart-item">
                <div class="item-checkbox">
                    <input type="checkbox" id="item1" checked>
                    <label for="item1">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <circle cx="10" cy="10" r="9" fill="#00C9A7" stroke="#00C9A7" stroke-width="2"/>
                            <path d="M6 10L9 13L14 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </label>
                </div>
                <div class="item-image">
                    <img src="https://www.figma.com/api/mcp/asset/ae320772-f05f-4016-99c2-8bf1e995636a" alt="茶叶冰岛道-普洱茶-古树-龙珠">
                </div>
                <div class="item-details">
                    <h3 class="item-name">茶叶冰岛道-普洱茶-古树-龙珠</h3>
                    <p class="item-specs">净重: 120g一盒, 口味: 古树生茶</p>
                    <div class="item-footer">
                        <span class="item-price">¥126.00</span>
                        <div class="quantity-control">
                            <button class="qty-btn" aria-label="减少">−</button>
                            <span class="qty-value">1</span>
                            <button class="qty-btn" aria-label="增加">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="cart-item">
                <div class="item-checkbox">
                    <input type="checkbox" id="item2" checked>
                    <label for="item2">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <circle cx="10" cy="10" r="9" fill="#00C9A7" stroke="#00C9A7" stroke-width="2"/>
                            <path d="M6 10L9 13L14 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </label>
                </div>
                <div class="item-image">
                    <img src="https://via.placeholder.com/80x80/8B4513/FFFFFF?text=Red+Tea" alt="茶叶古树普红-红茶-古树-散茶">
                </div>
                <div class="item-details">
                    <h3 class="item-name">茶叶古树普红-红茶-古树-散茶</h3>
                    <p class="item-specs">净重: 50g一盒, 口味: 古树红</p>
                    <div class="item-footer">
                        <span class="item-price">¥76.00</span>
                        <div class="quantity-control">
                            <button class="qty-btn" aria-label="减少">−</button>
                            <span class="qty-value">1</span>
                            <button class="qty-btn" aria-label="增加">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recommendations Section -->
        <div class="recommendations">
            <h2 class="recommendations-title">╰ 猜你喜欢 ╯</h2>
            <div class="recommendations-grid">
                <div class="recommendation-item">
                    <img src="https://via.placeholder.com/150x150/87CEEB/333?text=Tea+1" alt="茶叶冰岛道-普洱茶-古树-龙珠">
                    <h4 class="recommendation-name">茶叶冰岛道-普洱茶-古树-龙珠</h4>
                    <p class="recommendation-price">¥100.00</p>
                </div>
                <div class="recommendation-item">
                    <img src="https://via.placeholder.com/150x150/8B4513/FFF?text=Tea+2" alt="茶叶古树普红-红茶-古树-散茶">
                    <h4 class="recommendation-name">茶叶古树普红-红茶-古树-散茶</h4>
                    <p class="recommendation-price">¥76.00</p>
                </div>
                <div class="recommendation-item">
                    <img src="https://via.placeholder.com/150x150/9370DB/FFF?text=Tea+3" alt="茶叶产品">
                    <h4 class="recommendation-name">茶叶产品</h4>
                    <p class="recommendation-price">¥88.00</p>
                </div>
                <div class="recommendation-item">
                    <img src="https://via.placeholder.com/150x150/90EE90/333?text=Tea+4" alt="茶叶产品">
                    <h4 class="recommendation-name">茶叶产品</h4>
                    <p class="recommendation-price">¥95.00</p>
                </div>
            </div>
        </div>

        <!-- Footer Checkout Bar -->
        <div class="checkout-bar">
            <div class="checkout-left">
                <input type="checkbox" id="selectAll" checked>
                <label for="selectAll" class="select-all">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="9" fill="#00C9A7" stroke="#00C9A7" stroke-width="2"/>
                        <path d="M6 10L9 13L14 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>全选</span>
                </label>
                <div class="total">
                    <span class="total-label">合计:</span>
                    <span class="total-price">¥202.00</span>
                </div>
            </div>
            <button class="checkout-btn">去结算(2)</button>
        </div>
    </div>

    <script src="js/shopping-cart.js"></script>
</body>
</html>
